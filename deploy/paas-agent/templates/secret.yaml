{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paas-agent.secretName" . }}
  labels:
    {{- include "paas-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  PAAS_AGENT_TOKEN: {{ required "secret.token or secret.existingSecret is required" .Values.secret.token | quote }}
{{- end }}
