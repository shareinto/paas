apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paas-agent.fullname" . }}
  labels:
    {{- include "paas-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "paas-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "paas-agent.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.podAnnotations }}
      annotations:
      {{- end }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secret.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "paas-agent.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: paas-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PAAS_CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "paas-agent.fullname" . }}
                  key: PAAS_CLUSTER_ID
            - name: PAAS_CONTROL_PLANE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "paas-agent.fullname" . }}
                  key: PAAS_CONTROL_PLANE_URL
            - name: PAAS_AGENT_NAMESPACES
              valueFrom:
                configMapKeyRef:
                  name: {{ include "paas-agent.fullname" . }}
                  key: PAAS_AGENT_NAMESPACES
            - name: PAAS_ARGOCD_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "paas-agent.fullname" . }}
                  key: PAAS_ARGOCD_NAMESPACE
            - name: PAAS_HEARTBEAT_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "paas-agent.fullname" . }}
                  key: PAAS_HEARTBEAT_INTERVAL
            - name: PAAS_SNAPSHOT_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "paas-agent.fullname" . }}
                  key: PAAS_SNAPSHOT_INTERVAL
            - name: PAAS_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "paas-agent.secretName" . }}
                  key: PAAS_AGENT_TOKEN
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
